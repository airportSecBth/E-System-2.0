<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .maintenance-container {
      text-align: center;
    }

    img {
      max-width: 100%;
      max-height: 100vh;
      height: auto;
      width: auto;
    }
  </style>
</head>

<body>
  <div class="maintenance-container">
    <img src="https://drive.google.com/thumbnail?id=1VY0Ok4EpKEdrvvKEaY7uQnTDtFhAV8CA&sz=w1000" alt="Maintenance">
  </div>
</body>
</html>
